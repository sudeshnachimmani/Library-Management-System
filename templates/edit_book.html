<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>

    <style>
        body{
            font-family: Arial;
            margin:40px;
        }

        input{
            width:300px;
            padding:8px;
            margin:8px 0;
        }

        button{
            padding:10px 20px;
        }
    </style>

</head>
<body>

<h1>Edit Book</h1>

<form method="POST">

<label>Book Name</label><br>
<input type="text" name="book_name" value="{{ book[1] }}" required><br>

<label>Author</label><br>
<input type="text" name="author" value="{{ book[2] }}" required><br>

<label>Category</label><br>
<input type="text" name="category" value="{{ book[3] }}" required><br>

<label>Quantity</label><br>
<input type="number" name="quantity" value="{{ book[4] }}" required><br><br>

<button type="submit">Update Book</button>

</form>

<br>

<a href="/books">Back to Books</a>

</body>
</html>
